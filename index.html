<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Alfaro's Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
   
<header>
  <a href="index.html">
    <img src="./img/logo-alfaros-travel-sin-fondo.png" alt="Logo de Alfaros Travel">
  </a>

  <nav>
    <a class="paginaHotel" href="pages/hoteles.html">
      Todos los hoteles
    </a>

    <a class="paginaReservas" href="pages/mi-reserva.html">
      Mis Reservas
    </a>
  </nav>
</header>

<main>
    <h1>ALFARO'S TRAVEL</h1>

    <!-- Carrusel de imagenes -->
    <div id="carouselExampleIndicators" class="carousel slide">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="img/hoteles-margarita.png" class="d-block w-100" alt="Castillo Isla de Margarita">
        </div>
        <div class="carousel-item">
            <img src="img/el-yaque-playa.jpg" class="d-block w-100" alt="Playa el Yaque">
        </div>
        <div class="carousel-item">
            <img src="img/margarita-hesperia.jpg" class="d-block w-100" alt="Hesperia Margarita">
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
    </div>

  <h2>Hoteles Destacados</h2>

  <!-- div para el JS-->
  <div class="contenedor-destacados"> </div>


  <!-- form con bootstrap -->
    <h2 class="titulo-suscripcion"> Suscríbete y recibe promociones </h2>

  <section class="suscripcion">
    <form id="form-suscripcion" class="row p-4 g-4">
  
      <div class="col-md-6">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre" required >
      </div>
  
      <div class="col-md-6">
        <label for="apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="apellido" placeholder="Ingresa tu apellido" required >
      </div>
  
      <div class="col-12">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="correo@mail.com" required >
      </div>
  
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="recibir-promociones" >
    
          <label class="form-check-label" for="recibir-promociones" >
            Deseo recibir promociones y novedades por email.
          </label>
        </div>
      </div>
  
      <div class="col-12">
        <button type="submit" class="btn btn-primary">
          Suscribirme
        </button>
      </div>
  
    
    </form>
  </section>

  <div>
    <p id="mensaje-suscripcion"></p>
  </div>

</main>

        <!-- footer -->
  <footer>
    <p>Todos los derechos reservados</p>
    <div class="link">
      <a href="https://www.instagram.com/alfarostravel/">
          <img src="./img/Instagram_icon.png" alt="IG de Alfaros Travel">
      </a>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/main.js"></script>
<script src="js/suscripcion.js"></script>
</body>
</html>
